server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Fichiers statiques hashés par Angular : cache long, immuable
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html : jamais mis en cache (sinon les déploiements ne se propagent pas)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Reverse proxy optionnel vers le backend FastAPI, UNIQUEMENT si
    # front + back sont servis sur le même domaine (auquel cas
    # environment.prod.ts::apiUrl doit alors valoir '/api/v1', pas une URL
    # absolue). Avec le déploiement par défaut (docker-compose.prod.yml,
    # deux sous-domaines distincts + apiUrl absolu), ce bloc n'est jamais
    # atteint et peut être supprimé.
    location /api/v1/ {
        proxy_pass http://backend:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fallback SPA : toute route inconnue sert index.html (routing Angular)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
